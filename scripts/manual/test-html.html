<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="400" height="400"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.globalAlpha = 0.5;
ctx.fillStyle = 'blue';

ctx.beginPath();
ctx.rect(50, 50, 100, 100);
ctx.rect(100, 100, 100, 100);
ctx.fill();

</script>
</body>
</html>
